services:
  postgres-db:
    image: postgres:15-alpine
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

  node-crud:
    build: ./server
    restart: always

    expose:
      - "3000"

    depends_on:
      - postgres-db

    environment:
      CONN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}

  node-client:
    build: ./client
    restart: always

    ports:
      - "80:80"

    depends_on:
      - node-crud

volumes:
  postgres_data: