name: doploy node-crud
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Deplaoy via SSH
        uses: appleboy/ssh-action@1.0.3
        with:
          host: ${{secrets.SSH_HOST}}
          username: ubuntu
          key: ${{secrets.SSH_KEY}}
          script: |
            cd /home/ubuntu/node-crud
            git pull
            docker compose up --build -d
          